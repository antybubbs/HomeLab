{% extends "base.html" %}
{% block extra_head %}<link rel="stylesheet" href="/static/css/remote.css?v={{ asset_version }}">{% endblock %}
{% block content %}
{% macro switch(name, title, description) -%}
<label class="remote-setting-row">
  <span><strong>{{ title }}</strong><small>{{ description }}</small></span>
  <input class="remote-switch" name="{{ name }}" type="checkbox" value="1" {% if settings.get(name) == '1' %}checked{% endif %}>
</label>
{%- endmacro %}

<div class="topbar">
  <div>
    <h1>Site Settings</h1>
    <p class="muted">Global environment settings for HomeLab.</p>
  </div>
</div>

{% if message %}<div class="success">{{ message }}</div>{% endif %}

<form method="post" action="/admin/settings" class="remote-card">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

  <h2>General</h2>

    <section class="remote-settings-card" id="general">
    <div class="remote-settings-grid">
      <label>Base URL
        <input name="base_url" type="url" value="{{ settings.get('base_url', '') }}" placeholder="http://localhost:8080">
      </label>
      <label>Application Name
        <input name="app_name" type="text" value="{{ settings.get('app_name', 'HomeLab') }}">
      </label>
    </div>
  </section>

  <h2>Uploads</h2>

    <section class="remote-settings-card" id="general">
    <div class="remote-settings-grid">
      <label>Maximum Upload Size</strong>
        <small>Maximum upload size in MB.</small>
        <input name="max_upload_mb" type="number" min="1" value="{{ settings.get('max_upload_mb', '25') }}">
      </label>
    </div>
  </section>

  <div style="margin-top: 1.5rem;">
    <button type="submit" class="btn btn-primary">Save settings</button>
  </div>
</form>
{% endblock %}
