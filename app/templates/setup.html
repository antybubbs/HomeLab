<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>HomeLab Setup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <main style="max-width:420px;margin:80px auto;font-family:Arial,sans-serif;">
        <h1>Welcome to HomeLab</h1>
        <p>Create your administrator account.</p>

        {% if error %}
            <p style="color:red;">{{ error }}</p>
        {% endif %}

        <form method="post" action="/setup">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <p>
                <label>Email</label><br>
                <input type="email" name="email" required style="width:100%;padding:8px;">
            </p>

            <p>
                <label>Password</label><br>
                <input type="password" name="password" required minlength="12" style="width:100%;padding:8px;">
            </p>

            <p>
                <label>Confirm password</label><br>
                <input type="password" name="confirm_password" required minlength="12" style="width:100%;padding:8px;">
            </p>

            <button type="submit" style="padding:10px 16px;">
                Create administrator
            </button>
        </form>
    </main>
</body>
</html>
