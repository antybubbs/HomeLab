{% extends "base.html" %}
{% block content %}
<div class="topbar"><div><h1>Add Group</h1></div><a class="button secondary" href="/ip-addresses">Back</a></div>
{% if error %}<div class="alert">{{ error }}</div>{% endif %}
<section class="panel">
<form method="post" class="form-grid">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
  <label>Name<input name="name" placeholder="VLAN 1" required></label>
  <label class="wide">Description<textarea name="description" placeholder="192.168.1.0/24"></textarea></label>
  <button class="button secondary" type="reset">Reset</button>
  <button type="submit">Save</button>
</form>
</section>
{% endblock %}
