name: homelab

services:
  homelab:
    build: .
    container_name: homelab
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    security_opt:
      - no-new-privileges:true
    cap_add:
      - NET_RAW
    read_only: false
    tmpfs:
      - /tmp
  guacd:
    # Guacamole 1.6.0 defaults to FreeRDP 2, whose resize path can assert if
    # display-update arrives while a frame is being painted. Build against
    # FreeRDP 3.8.0, which flushes/releases the update lock before resizing.
    build:
      context: https://github.com/apache/guacamole-server.git#1.6.0
      args:
        FREERDP_VERSION: "3"
        WITH_FREERDP: '3\.8\.0'
    image: homelab-guacd:1.6.0-freerdp3.8.0
    container_name: guacd
    restart: unless-stopped

networks:
  default:
    driver: bridge
    driver_opts:
      # Match NetBird's default WireGuard MTU so large RDP graphics packets do
      # not enter the VPN through a 1500-byte Docker bridge and black-hole.
      com.docker.network.driver.mtu: "1280"
